<style>
  .zp-catalogo {
    --panel: #121722;
    --texto: #ffffff;
    --suave: #aeb6c9;
    --acento: #ffb000;
    --borde: rgba(255, 255, 255, 0.08);

    width: 100vw !important;
    max-width: 100vw !important;
    margin-left: calc(50% - 50vw) !important;
    margin-right: calc(50% - 50vw) !important;
    box-sizing: border-box !important;

    background:
      radial-gradient(circle at top, rgba(255, 176, 0, 0.13), transparent 32%),
      linear-gradient(180deg, #101522 0%, #06070c 100%);
    color: var(--texto);
    font-family: Arial, Helvetica, sans-serif;
    padding: 35px 16px;
    border-radius: 22px;
  }

  .zp-hero {
    max-width: 1496px;
    margin: 0 auto 28px;
    padding: 36px 20px;
    text-align: center;
    background:
      linear-gradient(135deg, rgba(255, 176, 0, 0.13), rgba(255, 255, 255, 0.03)),
      var(--panel);
    border: 1px solid var(--borde);
    border-radius: 26px;
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
    box-sizing: border-box;
  }

  .zp-hero h1 {
    margin: 0;
    color: #fff;
    font-size: clamp(2rem, 5vw, 4rem);
    line-height: 1.05;
    text-transform: uppercase;
  }

  .zp-hero h1 span {
    color: var(--acento);
  }

  .zp-hero p {
    max-width: 760px;
    margin: 14px auto 0;
    color: var(--suave);
    font-size: 16px;
    line-height: 1.6;
  }

  .zp-contenedor {
    max-width: 1496px;
    margin: 0 auto;
  }

  .zp-barra {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
    margin-bottom: 18px;
    padding: 15px;
    background: rgba(18, 23, 34, 0.88);
    border: 1px solid var(--borde);
    border-radius: 16px;
    box-sizing: border-box;
  }

  .zp-barra strong {
    color: #fff;
    font-size: 18px;
  }

  .zp-barra span {
    color: var(--suave);
    font-size: 14px;
  }

  .zp-buscador {
    width: 100%;
    max-width: 320px;
    padding: 11px 14px;
    color: #fff;
    background: #080a10;
    border: 1px solid var(--borde);
    border-radius: 12px;
    outline: none;
    box-sizing: border-box;
  }

  .zp-buscador:focus {
    border-color: var(--acento);
  }

  .zp-grid {
    display: grid;
    grid-template-columns: repeat(8, 180px);
    gap: 8px;
    justify-content: center;
    min-height: 250px;
  }

  .zp-card {
    display: block;
    overflow: hidden;
    width: 180px;
    height: 250px;
    text-decoration: none;
    background: transparent;
    border: 1px solid var(--borde);
    border-radius: 10px;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.42);
    transition: 0.22s ease;
    box-sizing: border-box;
  }

  .zp-card:hover {
    transform: translateY(-5px);
    border-color: rgba(255, 176, 0, 0.72);
    box-shadow: 0 16px 35px rgba(0, 0, 0, 0.58);
  }

  .zp-cover {
    position: relative;
    width: 180px;
    height: 250px;
    background: #080a10;
    overflow: hidden;
  }

  .zp-cover img {
    width: 180px;
    height: 250px;
    object-fit: cover;
    display: block;
    transition: 0.28s ease;
  }

  .zp-card:hover .zp-cover img {
    transform: scale(1.045);
    filter: brightness(1.08);
  }

  .zp-navegacion {
    margin-top: 34px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    text-align: center;
  }

  .zp-btn {
    cursor: pointer;
    border: none;
    padding: 14px 30px;
    border-radius: 999px;
    background: var(--acento);
    color: #111;
    font-size: 15px;
    font-weight: bold;
    box-shadow: 0 12px 28px rgba(255, 176, 0, 0.22);
    transition: 0.25s ease;
  }

  .zp-btn:hover:not(:disabled) {
    background: #ffd166;
    transform: translateY(-3px);
  }

  .zp-btn:disabled {
    opacity: 0.38;
    cursor: default;
    transform: none;
    box-shadow: none;
  }

  .zp-pagina-info {
    min-width: 140px;
    color: var(--suave);
    font-size: 14px;
    font-weight: bold;
  }

  /* Pantallas medianas */
  @media (max-width: 1540px) {
    .zp-contenedor,
    .zp-hero {
      max-width: 1300px;
    }

    .zp-grid {
      grid-template-columns: repeat(7, 180px);
    }
  }

  @media (max-width: 1340px) {
    .zp-contenedor,
    .zp-hero {
      max-width: 1120px;
    }

    .zp-grid {
      grid-template-columns: repeat(6, 180px);
    }
  }

  @media (max-width: 1160px) {
    .zp-contenedor,
    .zp-hero {
      max-width: 940px;
    }

    .zp-grid {
      grid-template-columns: repeat(5, 180px);
    }
  }

  @media (max-width: 970px) {
    .zp-contenedor,
    .zp-hero {
      max-width: 760px;
    }

    .zp-grid {
      grid-template-columns: repeat(4, 180px);
    }
  }

  @media (max-width: 790px) {
    .zp-catalogo {
      padding: 26px 10px;
      border-radius: 14px;
    }

    .zp-barra {
      display: block;
      text-align: center;
    }

    .zp-buscador {
      max-width: 100%;
      margin-top: 12px;
    }

    .zp-grid {
      grid-template-columns: repeat(3, 160px);
      gap: 8px;
    }

    .zp-card,
    .zp-cover,
    .zp-cover img {
      width: 160px;
      height: 222px;
    }
  }

  /* Móvil */
  @media (max-width: 540px) {
    .zp-grid {
      grid-template-columns: repeat(2, 160px);
      gap: 8px;
    }

    .zp-card,
    .zp-cover,
    .zp-cover img {
      width: 160px;
      height: 222px;
    }
  }

  @media (max-width: 360px) {
    .zp-grid {
      grid-template-columns: repeat(2, 145px);
      gap: 7px;
    }

    .zp-card,
    .zp-cover,
    .zp-cover img {
      width: 145px;
      height: 202px;
    }
  }
</style>

<section class="zp-catalogo">

  <div class="zp-hero">
    <h1>🎮 PC <span>Bajos Requisitos</span></h1>
    <p>
      Catálogo de juegos livianos y clásicos. Usa los botones de navegación
      para ver más títulos sin cambiar de página.
    </p>
  </div>

  <div class="zp-contenedor">

    <div class="zp-barra">
      <div>
        <strong>Biblioteca de juegos</strong><br>
        <span id="zpContador">Cargando juegos...</span>
      </div>

      <input
        type="text"
        id="zpBuscador"
        class="zp-buscador"
        placeholder="Buscar juego..."
      >
    </div>

    <div class="zp-grid" id="zpGrid"></div>

    <div class="zp-navegacion">
      <button class="zp-btn" id="zpBtnAtras">Atrás</button>
      <span class="zp-pagina-info" id="zpPaginaInfo">Página 1 de 1</span>
      <button class="zp-btn" id="zpBtnSiguiente">Siguiente</button>
    </div>

  </div>

</section>

<script>
  (function () {
    function iniciarCatalogoZP() {
      const zpGrid = document.getElementById("zpGrid");
      const zpBtnAtras = document.getElementById("zpBtnAtras");
      const zpBtnSiguiente = document.getElementById("zpBtnSiguiente");
      const zpContador = document.getElementById("zpContador");
      const zpPaginaInfo = document.getElementById("zpPaginaInfo");
      const zpBuscador = document.getElementById("zpBuscador");
      const zpHtmlViejo = document.getElementById("zpHtmlViejo");

      if (
        !zpGrid ||
        !zpBtnAtras ||
        !zpBtnSiguiente ||
        !zpContador ||
        !zpPaginaInfo ||
        !zpBuscador ||
        !zpHtmlViejo
      ) {
        return;
      }

      let zpTodosLosJuegos = [];
      let zpJuegosFiltrados = [];
      let zpPaginaActual = 1;

      /*
        8 = siempre muestra máximo 8 juegos.
        En PC grande será una sola fila de 8.
      */
      const zpJuegosPorPagina = 8;

      function zpNormalizarUrl(url) {
        if (!url) return "";

        url = url.trim();

        if (url.startsWith("//")) {
          url = window.location.protocol + url;
        }

        /*
          Si tu web está en HTTPS, muchas imágenes HTTP se bloquean.
          Esto intenta convertirlas automáticamente a HTTPS.
        */
        if (window.location.protocol === "https:" && url.startsWith("http://")) {
          url = url.replace("http://", "https://");
        }

        return url;
      }

      function zpLimpiarTitulo(texto) {
        return texto
          .replace(".html", "")
          .replace(/https?:\/\/[^/]+\//gi, "")
          .replace(/mega|mediafire|full|pc|gb|mb|espanol|español|para|juegos|download|descargar/gi, "")
          .replace(/[0-9]+/g, "")
          .replace(/[-_]+/g, " ")
          .replace(/\s+/g, " ")
          .trim()
          .split(" ")
          .map(function(palabra) {
            return palabra.charAt(0).toUpperCase() + palabra.slice(1);
          })
          .join(" ");
      }

      function zpExtraerJuegosDesdeHtml() {
        const htmlPegado = zpHtmlViejo.value;

        const contenedorTemporal = document.createElement("div");
        contenedorTemporal.innerHTML = htmlPegado;

        const enlaces = contenedorTemporal.querySelectorAll("a");
        const juegos = [];

        enlaces.forEach(function(enlace) {
          const imagen = enlace.querySelector("img");

          if (!imagen) return;

          const urlJuego = zpNormalizarUrl(enlace.getAttribute("href") || "#");
          const urlImagen = zpNormalizarUrl(imagen.getAttribute("src") || "");
          const altImagen = imagen.getAttribute("alt") || "";
          const tituloDesdeUrl = zpLimpiarTitulo(urlJuego);

          if (!urlImagen) return;

          juegos.push({
            titulo: altImagen.trim() || tituloDesdeUrl || "Juego",
            imagen: urlImagen,
            enlace: urlJuego
          });
        });

        return juegos;
      }

      function zpCrearCard(juego) {
        const card = document.createElement("a");
        card.className = "zp-card";
        card.href = juego.enlace;
        card.title = juego.titulo;

        const cover = document.createElement("div");
        cover.className = "zp-cover";

        const img = document.createElement("img");
        img.src = juego.imagen;
        img.alt = "";
        img.loading = "lazy";
        img.referrerPolicy = "no-referrer";

        img.onerror = function () {
          this.style.display = "none";
          cover.style.background = "#111827";
        };

        cover.appendChild(img);
        card.appendChild(cover);

        return card;
      }

      function zpTotalPaginas() {
        return Math.max(1, Math.ceil(zpJuegosFiltrados.length / zpJuegosPorPagina));
      }

      function zpMostrarPagina() {
        zpGrid.innerHTML = "";

        const totalPaginas = zpTotalPaginas();

        if (zpPaginaActual < 1) {
          zpPaginaActual = 1;
        }

        if (zpPaginaActual > totalPaginas) {
          zpPaginaActual = totalPaginas;
        }

        const inicio = (zpPaginaActual - 1) * zpJuegosPorPagina;
        const fin = inicio + zpJuegosPorPagina;
        const juegosPagina = zpJuegosFiltrados.slice(inicio, fin);

        juegosPagina.forEach(function(juego) {
          zpGrid.appendChild(zpCrearCard(juego));
        });

        zpContador.textContent =
          "Mostrando " + juegosPagina.length + " de " + zpJuegosFiltrados.length + " juegos";

        zpPaginaInfo.textContent =
          "Página " + zpPaginaActual + " de " + totalPaginas;

        zpBtnAtras.disabled = zpPaginaActual <= 1;
        zpBtnSiguiente.disabled = zpPaginaActual >= totalPaginas;
      }

      zpBtnAtras.addEventListener("click", function() {
        if (zpPaginaActual > 1) {
          zpPaginaActual--;
          zpMostrarPagina();
        }
      });

      zpBtnSiguiente.addEventListener("click", function() {
        if (zpPaginaActual < zpTotalPaginas()) {
          zpPaginaActual++;
          zpMostrarPagina();
        }
      });

      zpBuscador.addEventListener("input", function() {
        const busqueda = zpBuscador.value.toLowerCase().trim();

        zpJuegosFiltrados = zpTodosLosJuegos.filter(function(juego) {
          return juego.titulo.toLowerCase().includes(busqueda);
        });

        zpPaginaActual = 1;
        zpMostrarPagina();
      });

      zpTodosLosJuegos = zpExtraerJuegosDesdeHtml();
      zpJuegosFiltrados = zpTodosLosJuegos;
      zpMostrarPagina();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", iniciarCatalogoZP);
    } else {
      iniciarCatalogoZP();
    }
  })();
</script>
